<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BG Bedwars – Rankings</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Oxanium:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0c10;
      --surface: #111318;
      --card:    #161a22;
      --border:  #222633;
      --accent:  #e63946;
      --gold:    #ffd700;
      --silver:  #c0c0c0;
      --bronze:  #cd7f32;
      --diamond: #88eeff;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --s-tier:  #ff4d6d;
      --a-tier:  #f77f00;
      --b-tier:  #fcbf49;
      --c-tier:  #4cc9f0;
      --d-tier:  #7b8cde;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Rajdhani', sans-serif; font-size: 16px;
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: url('lighthouse-bedwars-screenshots-1.png') center center / cover no-repeat;
      filter: blur(6px) brightness(0.22) saturate(0.8);
      transform: scale(1.05);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(10,12,16,0.55) 0%, rgba(10,12,16,0.72) 100%);
      pointer-events: none; z-index: 0;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,12,16,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 58px;
    }
    .nav-logo {
      font-family: 'Oxanium', sans-serif; font-weight: 800; font-size: 1.25rem;
      letter-spacing: 0.04em; color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo span { color: var(--accent); }
    .logo-icon { width: 32px; height: 32px; border-radius: 7px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.85rem;
      font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 6px; transition: color 0.2s, background 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface); }
    .nav-links a.active { color: var(--accent); }
    .discord-btn {
      background: rgba(88,101,242,0.15) !important; color: #7289da !important;
      border: 1px solid rgba(88,101,242,0.3) !important; text-transform: none !important;
    }
    .discord-btn:hover { background: rgba(88,101,242,0.28) !important; color: #fff !important; }
    .hero { position: relative; z-index: 1; text-align: center; padding: 48px 24px 32px; }
    .hero-label {
      display: inline-block; font-family: 'Oxanium', sans-serif; font-size: 0.7rem;
      font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.25); padding: 4px 14px; border-radius: 20px; margin-bottom: 16px;
    }
    .hero h1 { font-family: 'Oxanium', sans-serif; font-weight: 800; font-size: clamp(2rem,5vw,3.4rem); line-height: 1.05; }
    .hero h1 em { font-style: normal; color: var(--accent); }
    .hero-sub { margin-top: 10px; color: var(--muted); font-size: 0.95rem; }
    .tabs-wrap { position: relative; z-index: 1; display: flex; justify-content: center; gap: 8px; padding: 0 24px 28px; }
    .tab-btn {
      font-family: 'Oxanium', sans-serif; font-weight: 600; font-size: 0.85rem;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 9px 24px;
      border-radius: 8px; border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 20px rgba(230,57,70,0.35); }
    .main { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; padding: 0 20px 80px; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
    #page-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #page-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-logo {
      font-family: 'Oxanium', sans-serif; font-weight: 800; font-size: 2rem;
      color: var(--text); letter-spacing: 0.05em;
    }
    .loader-logo span { color: var(--accent); }
    .loader-bar-wrap {
      width: 180px; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .loader-bar {
      height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #ff6b35);
      border-radius: 99px; animation: loadBar 1.1s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes loadBar { 0%{width:0%} 60%{width:75%} 100%{width:100%} }
    .loader-label {
      font-family: 'Oxanium', sans-serif; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
      animation: blink 1s ease infinite alternate;
    }
    @keyframes blink { from{opacity:0.4} to{opacity:1} }
    #app { opacity: 0; transition: opacity 0.5s ease; }
    #app.visible { opacity: 1; }
    .stat-num { font-family: 'Oxanium', sans-serif; font-weight: 800; font-size: 1.8rem; color: var(--text); line-height: 1; }
    .stat-num span { color: var(--accent); }
    .stat-lbl { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-wrap { flex: 1; position: relative; min-width: 200px; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .search-wrap input {
      width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 0.95rem;
      padding: 10px 14px 10px 38px; outline: none; transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .filter-select {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 0.9rem;
      font-weight: 600; padding: 10px 14px; outline: none; cursor: pointer;
    }
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--surface); border-bottom: 1px solid var(--border); }
    thead th { font-family: 'Oxanium', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 13px 16px; text-align: left; }
    thead th:first-child { width: 80px; text-align: center; }
    thead th:last-child { text-align: center; }
    tbody tr { border-bottom: 1px solid rgba(34,38,51,0.6); transition: background 0.2s, box-shadow 0.2s; cursor: pointer; animation: rowIn 0.5s ease both; }
    @keyframes rowIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(230,57,70,0.06); }
    tbody td { padding: 11px 16px; font-size: 0.95rem; font-weight: 600; }
    tbody td:first-child { text-align: center; }
    tbody td:last-child { text-align: center; }
    tbody tr.rank-diamond, tbody tr.rank-gold {
      background: rgba(255,215,0,0.04);
      box-shadow: inset 0 0 0 1px rgba(255,215,0,0.2), inset 4px 0 0 0 #ffd700;
      animation: rowIn 0.5s ease both, goldPulse 3s ease-in-out infinite;
    }
    @keyframes goldPulse {
      0%,100% { box-shadow: inset 0 0 0 1px rgba(255,215,0,0.2), inset 4px 0 0 0 #ffd700, 0 0 18px rgba(255,215,0,0.07); }
      50%      { box-shadow: inset 0 0 0 1px rgba(255,215,0,0.4), inset 4px 0 0 0 #ffd700, 0 0 28px rgba(255,215,0,0.16); }
    }
    .rank-badge-wrap { display: inline-flex; align-items: center; justify-content: center; position: relative; width: 50px; height: 50px; }
    .rank-icon-svg { width: 42px; height: 42px; }
    .rank-number-overlay {
      position: absolute; bottom: -3px; right: -5px;
      font-family: 'Oxanium', sans-serif; font-weight: 800; font-size: 0.7rem;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      padding: 1px 5px; line-height: 1.3; z-index: 2;
    }
    .player-cell { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 0.85rem; font-weight: 700; color: var(--text);
      flex-shrink: 0; font-family: 'Oxanium', sans-serif; border: 1px solid rgba(255,255,255,0.06);
    }
    .player-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .region-badge {
      display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px; background: rgba(107,114,128,0.15);
      color: var(--muted); border: 1px solid rgba(107,114,128,0.2);
    }
    .tier-badge {
      display: inline-block; font-family: 'Oxanium', sans-serif; font-weight: 800;
      font-size: 0.9rem; letter-spacing: 0.08em; padding: 4px 14px; border-radius: 6px; min-width: 48px;
    }
    .tier-S { background:rgba(255,77,109,0.15); color:var(--s-tier); border:1px solid rgba(255,77,109,0.3); }
    .tier-A { background:rgba(247,127,0,0.15);  color:var(--a-tier); border:1px solid rgba(247,127,0,0.3); }
    .tier-B { background:rgba(252,191,73,0.15); color:var(--b-tier); border:1px solid rgba(252,191,73,0.3); }
    .tier-C { background:rgba(76,201,240,0.15); color:var(--c-tier); border:1px solid rgba(76,201,240,0.3); }
    .tier-D { background:rgba(123,140,222,0.15);color:var(--d-tier); border:1px solid rgba(123,140,222,0.3); }
    .tier-key { margin-top: 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .tier-key-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .key-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
    footer { position: relative; z-index: 1; border-top: 1px solid var(--border); text-align: center; padding: 22px; font-size: 0.78rem; color: var(--muted); }
    footer strong { color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .modal-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
      font-family: 'Oxanium', sans-serif; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.06em; padding: 10px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; transition: all 0.2s;
    }
    .modal-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(230,57,70,0.06); }
    .modal-btn.copied { border-color: #50fa7b !important; color: #50fa7b !important; background: rgba(80,250,123,0.06) !important; }
    .modal-btn.shared { border-color: #4cc9f0 !important; color: #4cc9f0 !important; background: rgba(76,201,240,0.06) !important; }
    #confetti-canvas { position: fixed; inset: 0; z-index: 1100; pointer-events: none; }
    .spotlight-wrap {
      position: relative; z-index: 1;
      max-width: 980px; margin: 0 auto 0;
      padding: 0 20px 24px;
    }
    .spotlight-card {
      position: relative; border-radius: 16px; overflow: hidden;
      background: linear-gradient(135deg, #0d1117 0%, #12100a 60%, #0d1117 100%);
      border: 1px solid rgba(255,215,0,0.35);
      padding: 26px 28px;
      display: flex; align-items: center; gap: 22px; flex-wrap: wrap;
      animation: spotlightPulse 4s ease-in-out infinite;
      cursor: pointer;
    }
    @keyframes spotlightPulse {
      0%,100% { box-shadow: 0 0 30px rgba(255,215,0,0.08), inset 0 0 60px rgba(255,215,0,0.03), inset 4px 0 0 #ffd700; border-color: rgba(255,215,0,0.35); }
      50%      { box-shadow: 0 0 60px rgba(255,215,0,0.18), inset 0 0 80px rgba(255,215,0,0.07), inset 4px 0 0 #ffd700; border-color: rgba(255,215,0,0.65); }
    }
    .spotlight-card::after {
      content: '👑 ACTIVE #1'; position: absolute; top: 14px; right: 18px;
      font-family: 'Oxanium', sans-serif; font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.2em; color: rgba(255,215,0,0.55);
    }
    .spotlight-diamond { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
    .spotlight-diamond svg { width: 72px; height: 72px; filter: drop-shadow(0 0 16px #ffd700); animation: diamondSpin 4s ease-in-out infinite; }
    @keyframes diamondSpin { 0%,100%{filter:drop-shadow(0 0 10px #ffd700)} 50%{filter:drop-shadow(0 0 28px #ffd700)} }
    .spotlight-rank-num {
      position: absolute; bottom: -6px; right: -8px;
      font-family: 'Oxanium', sans-serif; font-weight: 800; font-size: 1rem;
      background: #0a0c10; border: 2px solid #ffd70044; border-radius: 6px;
      padding: 2px 8px; color: #ffd700; line-height: 1.3;
    }
    .spotlight-info { flex: 1; min-width: 160px; }
    .spotlight-name {
      font-family: 'Oxanium', sans-serif; font-weight: 800;
      font-size: clamp(1.5rem, 3vw, 2.2rem); color: var(--text); line-height: 1;
      letter-spacing: -0.01em;
    }
    .spotlight-sub { font-size: 0.88rem; color: var(--muted); margin-top: 5px; }
    .spotlight-titles { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .spotlight-right { margin-left: auto; text-align: center; flex-shrink: 0; }
    .spotlight-tier {
      font-family: 'Oxanium', sans-serif; font-weight: 800; font-size: 1.6rem;
      letter-spacing: 0.1em; padding: 8px 22px; border-radius: 8px;
      background: rgba(255,77,109,0.15); color: var(--s-tier);
      border: 1px solid rgba(255,77,109,0.35);
      box-shadow: 0 0 20px rgba(255,77,109,0.15);
    }
    .spotlight-cat { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.78); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      width: 90%; max-width: 440px; padding: 32px 28px; position: relative;
      transform: translateY(24px); transition: transform 0.25s;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; transition: color 0.2s; }
    .modal-close:hover { color: var(--text); }
    .modal-top { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .modal-rank-icon { position: relative; width: 78px; height: 78px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .modal-rank-num {
      position: absolute; bottom: -6px; right: -8px;
      font-family: 'Oxanium', sans-serif; font-weight: 800; font-size: 1rem;
      background: var(--bg); border: 2px solid var(--border); border-radius: 6px; padding: 2px 8px; line-height: 1.3;
    }
    .modal-name { font-family: 'Oxanium', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--text); line-height: 1.1; }
    .modal-country { font-size: 0.95rem; color: var(--muted); margin-top: 5px; }
    .modal-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .modal-field {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    }
    .field-icon { font-size: 1.15rem; flex-shrink: 0; }
    .field-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .field-value { font-size: 0.98rem; font-weight: 700; color: var(--text); margin-top: 3px; }
    .modal-titles-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .modal-titles { display: flex; flex-wrap: wrap; gap: 6px; }
    .title-chip { font-family: 'Oxanium', sans-serif; font-size: 0.76rem; font-weight: 700; padding: 4px 11px; border-radius: 20px; border: 1px solid; }
    .title-gold   { background:rgba(255,215,0,0.1);   color:#ffd700; border-color:rgba(255,215,0,0.3); }
    .title-silver { background:rgba(192,192,192,0.1); color:#c0c0c0; border-color:rgba(192,192,192,0.3); }
    .title-bronze { background:rgba(205,127,50,0.1);  color:#cd7f32; border-color:rgba(205,127,50,0.3); }
    .title-maint  { background:rgba(107,114,128,0.1); color:var(--muted); border-color:rgba(107,114,128,0.25); }
    .watermark {
      position: fixed; bottom: 20px; right: 20px; z-index: 200;
      background: rgba(16,18,26,0.85); backdrop-filter: blur(10px);
      border: 1px solid rgba(230,57,70,0.2); border-radius: 20px;
      padding: 7px 14px; display: flex; align-items: center; gap: 7px;
      font-family: 'Oxanium', sans-serif; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.06em; color: var(--muted);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: border-color 0.3s, color 0.3s;
    }
    .watermark:hover { border-color: rgba(230,57,70,0.5); color: var(--text); }
    .watermark span { color: var(--accent); }
    @media(max-width:620px) {
      .nav-links a:not(.discord-btn) { display: none; }
      .hero { padding: 32px 16px 20px; }
      .main { padding: 0 12px 60px; }
      thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
    }
    .hamburger-btn {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0; margin-left: 8px;
    }
    .hamburger-btn:hover { border-color: var(--accent); background: rgba(230,57,70,0.08); }
    .hamburger-btn.open { border-color: var(--accent); background: rgba(230,57,70,0.12); }
    .ham-line { width: 18px; height: 2px; background: var(--muted); border-radius: 2px; transition: all 0.3s; transform-origin: center; }
    .hamburger-btn.open .ham-line:nth-child(1) { transform: translateY(7px) rotate(45deg); background: var(--accent); }
    .hamburger-btn.open .ham-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger-btn.open .ham-line:nth-child(3) { transform:
